version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: fitcoach_postgres
    environment:
      POSTGRES_DB: fitcoach
      POSTGRES_USER: fitcoach
      POSTGRES_PASSWORD: fitcoach_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitcoach -d fitcoach"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
